# =====================================================================
# CREDPAY User Service - application configuration
# =====================================================================
# NOTE: Passwords are stored as PLAIN TEXT for this local capstone
# (no BCrypt yet). Secure with hashing before any real deployment.
# =====================================================================

spring.application.name=user-service
server.port=8080

# ---------------------------------------------------------------------
# PostgreSQL datasource (existing 'credpay' database)
# Override with environment variables when needed.
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/credpay
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------
# JPA / Hibernate
# The 'users' table already exists (created by schema.sql),
# so Hibernate must NOT manage the schema. Validate only.
# ---------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
