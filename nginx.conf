# =====================================================================
# Nginx config for the CREDPAY React SPA (single-page application)
# Installed at /etc/nginx/conf.d/default.conf
# =====================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never expose a directory file listing
    autoindex off;

    # ----- gzip compression -----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;

    # ----- Hashed static assets: cache aggressively -----
    # Vite emits content-hashed files under /assets, so they are immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----- SPA history fallback -----
    # Route any unknown URL to index.html so client-side routing and
    # browser refresh (e.g. /dashboard) work instead of returning 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Do not cache the HTML entry point -----
    # Ensures users always fetch the latest index.html after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
